name: PR Commenter

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-logs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get PR number from the triggering workflow run
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No pull requests found for this workflow run.');
              return;
            }
            const prNumber = prs[0].number;
            const senderLogin = context.payload.workflow_run.actor.login;
            
            const isSuccess = context.payload.workflow_run.conclusion === 'success';
            
            let commentBody = '';
            
            if (isSuccess) {
              commentBody = `## All CI Checks Passed\n\nGreat work @${senderLogin}! All checks passed:\n- Dependency installation\n- ESLint code quality\n- Next.js production build\n- TypeScript type checking\n- Unit tests\n\nYour PR is ready for maintainer review. A maintainer will look at it shortly!`;
            } else {
              commentBody = `## CI Check Failed\n\nHi @${senderLogin}, thank you for your contribution to **WorkSphere**! Unfortunately, one or more CI checks failed on your PR. Please review the output below and push a fix to your branch.\n\n---\n\n`;
              
              if (fs.existsSync('install_failed.txt') && fs.existsSync('install_output.log')) {
                const log = fs.readFileSync('install_output.log', 'utf8');
                commentBody += `### Dependency Installation Failure\n\n**What failed:** \`npm ci\` was unable to install packages.\n\n**How to fix:** Run \`npm install\` locally, commit your updated \`package-lock.json\`, and push again.\n\n<details><summary>Full log output</summary>\n\n\`\`\`\n${log.slice(-2000)}\n\`\`\`\n\n</details>\n\n---\n\n`;
              }
              
              if (fs.existsSync('lint_failed.txt') && fs.existsSync('lint_output.log')) {
                const log = fs.readFileSync('lint_output.log', 'utf8');
                commentBody += `### Lint Failure\n\n**What failed:** ESLint found errors or warnings in your code.\n\n**How to fix:** Run \`npm run lint\` locally to see all issues, then fix them.\n\n<details><summary>Full lint output</summary>\n\n\`\`\`\n${log.slice(-2000)}\n\`\`\`\n\n</details>\n\n---\n\n`;
              }
              
              if (fs.existsSync('build_failed.txt') && fs.existsSync('build_output.log')) {
                const log = fs.readFileSync('build_output.log', 'utf8');
                commentBody += `### Build / TypeScript Failure\n\n**What failed:** The Next.js production build or TypeScript compiler threw errors.\n\n**How to fix:** Run \`npm run build\` locally to reproduce. Fix any TypeScript type errors or missing module imports.\n\n<details><summary>Full build output</summary>\n\n\`\`\`\n${log.slice(-2000)}\n\`\`\`\n\n</details>\n\n---\n\n`;
              }
              
              if (fs.existsSync('test_failed.txt') && fs.existsSync('test_output.log')) {
                const log = fs.readFileSync('test_output.log', 'utf8');
                commentBody += `### Unit Test Failure\n\n**What failed:** One or more unit tests did not pass.\n\n**How to fix:** Run \`npm test\` locally to see which tests are failing.\n\n<details><summary>Full test output</summary>\n\n\`\`\`\n${log.slice(-2000)}\n\`\`\`\n\n</details>\n\n---\n\n`;
              }
              
              commentBody += `_Once all issues are resolved and your checks are green, a maintainer will review and merge your PR. Thank you for your patience!_`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
